<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthScape QA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --bg2: #0d1117;
    --bg3: #141b24;
    --border: #1e2d3d;
    --pass: #00e676;
    --fail: #ff3d57;
    --warn: #ffc107;
    --skip: #78909c;
    --text: #e0e8f0;
    --text2: #7a8fa6;
    --accent: #00b4d8;
    --glow-pass: rgba(0,230,118,0.15);
    --glow-fail: rgba(255,61,87,0.15);
    --glow-warn: rgba(255,193,7,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,216,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,216,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    background: rgba(8,11,16,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--text2);
  }

  .next-run {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
  }

  .next-run span { color: var(--accent); }

  /* Status Banner */
  .status-banner {
    margin: 28px 0;
    padding: 20px 28px;
    border-radius: 12px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    transition: all 0.3s;
  }

  .status-banner.PASS { border-color: var(--pass); background: var(--glow-pass); }
  .status-banner.FAIL { border-color: var(--fail); background: var(--glow-fail); }
  .status-banner.WARN { border-color: var(--warn); background: var(--glow-warn); }

  .banner-status {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .banner-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .banner-stat { text-align: center; }
  .banner-stat .val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    display: block;
  }
  .banner-stat .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

  .banner-meta { font-size: 11px; color: var(--text2); }

  /* Section title */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Client cards grid */
  .clients-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .client-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .client-card:hover { border-color: var(--accent); }

  .card-header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  .env-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }

  .env-badge.UAT { background: rgba(0,180,216,0.15); color: var(--accent); border: 1px solid rgba(0,180,216,0.3); }
  .env-badge.PROD { background: rgba(255,193,7,0.1); color: var(--warn); border: 1px solid rgba(255,193,7,0.3); }

  .status-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .status-pill.PASS { background: rgba(0,230,118,0.15); color: var(--pass); border: 1px solid rgba(0,230,118,0.3); }
  .status-pill.FAIL { background: rgba(255,61,87,0.15); color: var(--fail); border: 1px solid rgba(255,61,87,0.3); }
  .status-pill.WARN { background: rgba(255,193,7,0.1); color: var(--warn); border: 1px solid rgba(255,193,7,0.3); }
  .status-pill.SKIP, .status-pill.UNAVAILABLE { background: rgba(120,144,156,0.1); color: var(--skip); border: 1px solid rgba(120,144,156,0.3); }

  /* Stats row */
  .card-stats {
    display: flex;
    padding: 14px 20px;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-box {
    flex: 1;
    text-align: center;
    padding: 6px 0;
  }

  .stat-box:not(:last-child) { border-right: 1px solid var(--border); }

  .stat-box .num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    display: block;
  }

  .stat-box .num.pass { color: var(--pass); }
  .stat-box .num.fail { color: var(--fail); }
  .stat-box .num.warn { color: var(--warn); }
  .stat-box .num.total { color: var(--text); }
  .stat-box .lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

  /* Phases list */
  .phases-list { padding: 12px 0; }

  .phase-row {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(30,45,61,0.5);
  }

  .phase-row:hover { background: rgba(255,255,255,0.02); }
  .phase-row:last-child { border-bottom: none; }

  .phase-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
    width: 20px;
    flex-shrink: 0;
  }

  .phase-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
  }

  .phase-bar {
    width: 120px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .phase-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .phase-bar-fill.PASS { background: var(--pass); }
  .phase-bar-fill.FAIL { background: var(--fail); }
  .phase-bar-fill.WARN { background: var(--warn); }

  .phase-counts {
    font-size: 10px;
    color: var(--text2);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Expandable checks */
  .checks-list {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 8px 20px 8px 52px;
  }

  .checks-list.open { display: block; }

  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 11px;
    border-bottom: 1px solid rgba(30,45,61,0.4);
  }

  .check-item:last-child { border-bottom: none; }

  .check-icon { flex-shrink: 0; margin-top: 1px; }
  .check-icon.PASS { color: var(--pass); }
  .check-icon.FAIL { color: var(--fail); }
  .check-icon.WARN { color: var(--warn); }
  .check-icon.SKIP, .check-icon.UNAVAILABLE { color: var(--skip); }

  .check-body { flex: 1; }
  .check-id { font-weight: 700; color: var(--accent); font-size: 10px; }
  .check-desc { color: var(--text); margin: 1px 0; }
  .check-detail { color: var(--text2); font-size: 10px; margin-top: 2px; }

  /* Loading & error states */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text2);
    font-size: 13px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: var(--glow-fail);
    border: 1px solid var(--fail);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    color: var(--fail);
    margin: 40px 0;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 0;
    margin-top: 40px;
    font-size: 11px;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .clients-grid { grid-template-columns: 1fr; }
    .banner-stats { gap: 16px; }
    .phase-bar { width: 70px; }
    .header-meta { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        WealthScape QA
      </div>
      <div class="header-meta">
        <div class="next-run">Next run: <span id="countdown">--:--:--</span></div>
        <div id="last-updated">Loading...</div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      Fetching latest report...
    </div>
  </div>
</div>

<footer>
  <div class="container" style="display:flex;justify-content:space-between;width:100%;flex-wrap:wrap;gap:8px;">
    <span>WealthScape MF API Sanity Agent · Finfactor</span>
    <span>Runs daily at 07:00 IST</span>
  </div>
</footer>

<script>
const STATUS_ICON = { PASS: '✅', FAIL: '❌', WARN: '⚠️', SKIP: '⊘', UNAVAILABLE: '❓' };
const STATUS_LABEL = { PASS: 'ALL PASS', FAIL: 'FAILING', WARN: 'WARNINGS' };

function statusColor(s) {
  return s === 'PASS' ? 'var(--pass)' : s === 'FAIL' ? 'var(--fail)' : s === 'WARN' ? 'var(--warn)' : 'var(--skip)';
}

function formatDuration(start, end) {
  if (!start || !end) return '—';
  const ms = new Date(end) - new Date(start);
  const s = Math.round(ms / 1000);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true,
    timeZone: 'Asia/Kolkata'
  }) + ' IST';
}

function renderCheck(check) {
  return `
    <div class="check-item">
      <span class="check-icon ${check.status}">${STATUS_ICON[check.status] || '•'}</span>
      <div class="check-body">
        <div class="check-id">${check.check_id}</div>
        <div class="check-desc">${check.description}</div>
        ${check.details ? `<div class="check-detail">→ ${check.details}${check.tolerance ? ` &nbsp;|&nbsp; Tolerance: ${check.tolerance}` : ''}</div>` : ''}
        ${check.raw_response && check.status === 'FAIL' ? `<div class="check-detail" style="color:var(--fail)">Response: ${check.raw_response.substring(0,200)}</div>` : ''}
      </div>
    </div>`;
}

function renderPhase(phase, idx, clientKey) {
  const pct = phase.total > 0 ? (phase.passed / phase.total * 100) : 0;
  const checksHtml = phase.checks.map(renderCheck).join('');
  const id = `checks-${clientKey}-${idx}`;
  return `
    <div class="phase-row" onclick="toggleChecks('${id}')">
      <span class="phase-num">P${phase.phase_number}</span>
      <span class="phase-name">${phase.phase_name}</span>
      <div class="phase-bar">
        <div class="phase-bar-fill ${phase.status}" style="width:${pct}%"></div>
      </div>
      <span class="phase-counts">${phase.passed}/${phase.total}</span>
      <span class="status-pill ${phase.status}">${phase.status}</span>
    </div>
    <div class="checks-list" id="${id}">
      ${checksHtml || '<div style="padding:8px 0;color:var(--text2);font-size:11px">No checks recorded</div>'}
    </div>`;
}

function renderClient(client, idx) {
  const clientKey = `c${idx}`;
  const phasesHtml = client.phases.map((p, i) => renderPhase(p, i, clientKey)).join('');
  const duration = formatDuration(client.run_started, client.run_completed);
  const passRate = client.total_checks > 0 ? Math.round(client.passed / client.total_checks * 100) : 0;

  return `
    <div class="client-card">
      <div class="card-header">
        <div>
          <span class="card-title">${client.name}</span>
          <span class="env-badge ${client.environment}">${client.environment}</span>
        </div>
        <span class="status-pill ${client.status}">${client.status}</span>
      </div>
      <div class="card-stats">
        <div class="stat-box">
          <span class="num total">${client.total_checks}</span>
          <span class="lbl">Total</span>
        </div>
        <div class="stat-box">
          <span class="num pass">${client.passed}</span>
          <span class="lbl">Passed</span>
        </div>
        <div class="stat-box">
          <span class="num warn">${client.warnings}</span>
          <span class="lbl">Warnings</span>
        </div>
        <div class="stat-box">
          <span class="num fail">${client.failed}</span>
          <span class="lbl">Failed</span>
        </div>
        <div class="stat-box">
          <span class="num total">${passRate}%</span>
          <span class="lbl">Pass Rate</span>
        </div>
        <div class="stat-box">
          <span class="num total" style="font-size:14px">${duration}</span>
          <span class="lbl">Duration</span>
        </div>
      </div>
      <div class="phases-list">${phasesHtml}</div>
    </div>`;
}

function renderDashboard(data) {
  const overallClass = data.overall_status || 'FAIL';
  const totalChecks = data.total_checks || 0;
  const passRate = totalChecks > 0 ? Math.round(data.passed / totalChecks * 100) : 0;
  const clientsHtml = (data.clients || []).map(renderClient).join('');

  document.getElementById('last-updated').textContent = `Last run: ${formatDate(data.run_started)}`;

  return `
    <div class="status-banner ${overallClass}">
      <div>
        <div class="banner-status">
          ${STATUS_ICON[overallClass] || '•'} ${STATUS_LABEL[overallClass] || overallClass}
        </div>
        <div class="banner-meta" style="margin-top:6px">
          Run ID: ${data.run_id || '—'} &nbsp;·&nbsp; ${formatDate(data.run_started)} &nbsp;·&nbsp; Duration: ${formatDuration(data.run_started, data.run_completed)}
        </div>
      </div>
      <div class="banner-stats">
        <div class="banner-stat">
          <span class="val" style="color:var(--text)">${totalChecks}</span>
          <span class="lbl">Total Checks</span>
        </div>
        <div class="banner-stat">
          <span class="val" style="color:var(--pass)">${data.passed || 0}</span>
          <span class="lbl">Passed</span>
        </div>
        <div class="banner-stat">
          <span class="val" style="color:var(--warn)">${data.warnings || 0}</span>
          <span class="lbl">Warnings</span>
        </div>
        <div class="banner-stat">
          <span class="val" style="color:var(--fail)">${data.failed || 0}</span>
          <span class="lbl">Failed</span>
        </div>
        <div class="banner-stat">
          <span class="val" style="color:var(--accent)">${passRate}%</span>
          <span class="lbl">Pass Rate</span>
        </div>
      </div>
    </div>
    <div class="section-title">Environment Results</div>
    <div class="clients-grid">${clientsHtml}</div>
    ${data.errors && data.errors.length ? `
    <div class="section-title">Errors</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:32px">
      ${data.errors.map(e => `<div style="color:var(--fail);font-size:12px;padding:4px 0">• ${e}</div>`).join('')}
    </div>` : ''}`;
}

function toggleChecks(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// Countdown to next run (07:00 IST = 01:30 UTC)
function updateCountdown() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
  const next = new Date(ist);
  next.setHours(7, 0, 0, 0);
  if (ist >= next) next.setDate(next.getDate() + 1);
  const diff = next - ist;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

// Load report data
async function loadReport() {
  try {
    const res = await fetch('reports/latest_report.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('main-content').innerHTML = renderDashboard(data);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-box">
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">No report data available</div>
        <div style="font-size:12px;opacity:0.7">The agent hasn't run yet or the report file is missing.<br>Reports are generated daily at 07:00 IST.</div>
        <div style="margin-top:12px;font-size:11px;color:var(--text2)">${err.message}</div>
      </div>`;
  }
}

loadReport();
// Auto-refresh every 5 minutes
setInterval(loadReport, 5 * 60 * 1000);
</script>
</body>
</html>
