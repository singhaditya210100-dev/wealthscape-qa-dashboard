<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthScape QA · Finfactor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #6B2FE0; --purple-light: #EDE9FB; --purple-mid: #8B55E8; --purple-dark: #4A1FA3;
  --green: #12B76A; --green-light: #ECFDF5;
  --red: #F04438; --red-light: #FEF3F2; --red-mid: #FDA29B;
  --amber: #F79009; --amber-light: #FFFAEB;
  --blue: #1570EF; --blue-light: #EFF8FF;
  --gray-50: #F9FAFB; --gray-100: #F2F4F7; --gray-200: #EAECF0; --gray-300: #D0D5DD;
  --gray-400: #98A2B3; --gray-500: #667085; --gray-700: #344054; --gray-900: #101828;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(16,24,40,0.05);
  --shadow: 0 1px 3px rgba(16,24,40,0.1), 0 1px 2px rgba(16,24,40,0.06);
  --shadow-md: 0 4px 8px -2px rgba(16,24,40,0.1), 0 2px 4px -2px rgba(16,24,40,0.06);
  --shadow-lg: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.03);
  --radius: 12px; --radius-sm: 8px;
}

body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; }

.sidebar { width: 240px; min-height: 100vh; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--purple); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-icon svg { width: 18px; height: 18px; fill: white; }
.logo-text { font-size: 16px; font-weight: 700; color: var(--gray-900); }
.sidebar-nav { padding: 12px; flex: 1; }
.nav-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 8px; margin-bottom: 4px; margin-top: 16px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--gray-700); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; text-decoration: none; }
.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: var(--purple-light); color: var(--purple); }
.nav-item.active svg { stroke: var(--purple); }
.nav-item svg { width: 18px; height: 18px; stroke: var(--gray-500); stroke-width: 1.8; fill: none; flex-shrink: 0; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--gray-200); font-size: 12px; color: var(--gray-400); text-align: center; }

.main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 18px; font-weight: 600; color: var(--gray-900); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.next-run-badge { background: var(--purple-light); color: var(--purple); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
.next-run-badge .dot { width: 6px; height: 6px; background: var(--purple); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.last-updated { font-size: 12px; color: var(--gray-500); }
.refresh-btn { width: 34px; height: 34px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray-500); transition: all 0.15s; }
.refresh-btn:hover { background: var(--gray-100); }
.refresh-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

.content { padding: 24px 28px; flex: 1; }

.status-banner { border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; border: 1px solid; }
.status-banner.PASS { background: var(--green-light); border-color: #A9EFC5; }
.status-banner.FAIL { background: var(--red-light); border-color: #FECDCA; }
.status-banner.WARN { background: var(--amber-light); border-color: #FEC84B; }
.status-banner.UNAVAILABLE { background: var(--gray-100); border-color: var(--gray-300); }
.banner-left { display: flex; align-items: center; gap: 14px; }
.banner-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.PASS .banner-icon { background: #DCFCE7; } .FAIL .banner-icon { background: #FEE2E2; } .WARN .banner-icon { background: #FEF3C7; }
.banner-title { font-size: 16px; font-weight: 700; color: var(--gray-900); }
.banner-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.banner-stats { display: flex; gap: 24px; flex-wrap: wrap; }
.banner-stat { text-align: center; }
.banner-stat .val { font-size: 20px; font-weight: 700; display: block; line-height: 1.2; }
.banner-stat .val.pass { color: var(--green); } .banner-stat .val.fail { color: var(--red); } .banner-stat .val.warn { color: var(--amber); } .banner-stat .val.neutral { color: var(--gray-900); } .banner-stat .val.purple { color: var(--purple); }
.banner-stat .lbl { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 14px; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 8px; }

.clients-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(540px, 1fr)); gap: 16px; margin-bottom: 24px; }
.client-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
.client-card:hover { box-shadow: var(--shadow-md); }
.card-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-100); }
.card-title-wrap { display: flex; align-items: center; gap: 8px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--gray-900); }
.env-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
.env-badge.UAT { background: #EFF8FF; color: #1570EF; border: 1px solid #B2DDFF; }
.env-badge.PROD { background: var(--amber-light); color: #B54708; border: 1px solid #FEC84B; }
.status-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px; }
.status-badge.PASS { background: var(--green-light); color: #027A48; border: 1px solid #A9EFC5; }
.status-badge.FAIL { background: var(--red-light); color: #B42318; border: 1px solid #FECDCA; }
.status-badge.WARN { background: var(--amber-light); color: #B54708; border: 1px solid #FEC84B; }
.status-badge.SKIP, .status-badge.UNAVAILABLE { background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200); }

.card-stats { display: flex; border-bottom: 1px solid var(--gray-100); }
.stat-cell { flex: 1; padding: 12px 0; text-align: center; border-right: 1px solid var(--gray-100); }
.stat-cell:last-child { border-right: none; }
.stat-cell .num { font-size: 18px; font-weight: 700; display: block; line-height: 1.2; }
.stat-cell .num.pass { color: var(--green); } .stat-cell .num.fail { color: var(--red); } .stat-cell .num.warn { color: var(--amber); } .stat-cell .num.total { color: var(--gray-900); } .stat-cell .num.purple { color: var(--purple); }
.stat-cell .lbl { font-size: 10px; color: var(--gray-500); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

.pass-bar-wrap { padding: 8px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; }
.pass-bar { flex: 1; height: 5px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
.pass-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.pass-bar-fill.PASS { background: var(--green); } .pass-bar-fill.WARN { background: var(--amber); } .pass-bar-fill.FAIL { background: var(--red); }
.pass-bar-label { font-size: 11px; color: var(--gray-500); white-space: nowrap; }

.phase-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--gray-50); }
.phase-row:hover { background: var(--gray-50); }
.phase-row:last-child { border-bottom: none; }
.phase-num { width: 24px; height: 24px; border-radius: 6px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--gray-500); flex-shrink: 0; }
.phase-num.PASS { background: var(--green-light); color: #027A48; } .phase-num.FAIL { background: var(--red-light); color: #B42318; } .phase-num.WARN { background: var(--amber-light); color: #B54708; }
.phase-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-700); }
.phase-progress { width: 100px; height: 4px; background: var(--gray-100); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.phase-progress-fill { height: 100%; border-radius: 3px; }
.phase-progress-fill.PASS { background: var(--green); } .phase-progress-fill.FAIL { background: var(--red); } .phase-progress-fill.WARN { background: var(--amber); }
.phase-count { font-size: 11px; color: var(--gray-500); width: 40px; text-align: right; flex-shrink: 0; }
.phase-chevron { color: var(--gray-400); flex-shrink: 0; transition: transform 0.2s; }
.phase-chevron.open { transform: rotate(90deg); }

.checks-list { display: none; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
.checks-list.open { display: block; }

/* ── Check Item ── */
.check-item { border-bottom: 1px solid var(--gray-100); }
.check-item:last-child { border-bottom: none; }

.check-main { display: flex; gap: 10px; padding: 10px 20px 10px 56px; align-items: flex-start; }
.check-dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; font-weight: 700; }
.check-dot.PASS { background: var(--green-light); color: #027A48; }
.check-dot.FAIL { background: var(--red-light); color: #B42318; }
.check-dot.WARN { background: var(--amber-light); color: #B54708; }
.check-dot.SKIP, .check-dot.UNAVAILABLE { background: var(--gray-100); color: var(--gray-500); }
.check-body { flex: 1; min-width: 0; }
.check-id { font-size: 10px; font-weight: 600; color: var(--purple); margin-bottom: 1px; }
.check-desc { font-size: 12px; color: var(--gray-700); font-weight: 500; }
.check-detail { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

/* ── CTAs ── */
.check-ctas { display: flex; gap: 6px; padding: 0 20px 10px 84px; flex-wrap: wrap; }

.cta-btn {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 6px; cursor: pointer; border: 1px solid;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px;
  background: none;
}

.cta-details { color: var(--red); border-color: var(--red-mid); background: var(--red-light); }
.cta-details:hover { background: #FEE2E2; }
.cta-ticket { color: var(--purple); border-color: #C4B5FD; background: var(--purple-light); }
.cta-ticket:hover { background: #DDD6FE; }
.cta-copy { color: var(--gray-700); border-color: var(--gray-300); background: var(--white); }
.cta-copy:hover { background: var(--gray-100); }
.cta-copied { color: var(--green); border-color: #A9EFC5; background: var(--green-light); }

/* ── Detail Panel ── */
.check-detail-panel {
  display: none;
  margin: 0 20px 10px 84px;
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.check-detail-panel.open { display: block; }

.detail-panel-header {
  padding: 10px 14px;
  background: #FEF3F2;
  border-bottom: 1px solid #FECDCA;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; color: #B42318;
}

.detail-panel-body { padding: 12px 14px; }

.detail-section { margin-bottom: 12px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray-400); margin-bottom: 4px; }
.detail-value { font-size: 12px; color: var(--gray-700); line-height: 1.5; }
.detail-value.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; background: var(--gray-50); padding: 6px 8px; border-radius: 4px; border: 1px solid var(--gray-200); word-break: break-all; }

/* ── Ticket Panel ── */
.ticket-panel {
  display: none;
  margin: 0 20px 10px 84px;
  background: var(--white);
  border: 1px solid #C4B5FD;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.ticket-panel.open { display: block; }

.ticket-panel-header {
  padding: 10px 14px;
  background: var(--purple-light);
  border-bottom: 1px solid #C4B5FD;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 600; color: var(--purple);
}

.ticket-panel-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

.ticket-field { }
.ticket-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray-400); margin-bottom: 3px; }
.ticket-field-value {
  font-size: 12px; color: var(--gray-700); line-height: 1.5;
  background: var(--gray-50); padding: 8px 10px;
  border-radius: 6px; border: 1px solid var(--gray-200);
  white-space: pre-wrap; word-break: break-word;
}

.ticket-actions { display: flex; gap: 6px; padding-top: 4px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--gray-200); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--gray-500); }
.error-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 40px; text-align: center; }

/* ── Modal backdrop ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--white); border-radius: var(--radius);
  width: 560px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--gray-900); }
.modal-close { cursor: pointer; color: var(--gray-400); font-size: 20px; line-height: 1; border: none; background: none; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--gray-100); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 8px; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.15s; }
.btn-primary { background: var(--purple); color: white; border-color: var(--purple); }
.btn-primary:hover { background: var(--purple-dark); }
.btn-secondary { background: var(--white); color: var(--gray-700); border-color: var(--gray-300); }
.btn-secondary:hover { background: var(--gray-50); }

@media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; } .clients-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="logo-text">Finfactor</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">QA Agent</div>
    <a class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a class="nav-item" onclick="loadReport()">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z" stroke-dasharray="4"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      Latest Report
    </a>
    <div class="nav-label">Schedule</div>
    <a class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Daily 07:00 IST
    </a>
  </nav>
  <div class="sidebar-footer">WealthScape MF Sanity Agent</div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">API Sanity Dashboard</div>
    <div class="topbar-right">
      <div class="last-updated" id="last-updated">Loading...</div>
      <div class="next-run-badge">
        <span class="dot"></span>
        Next run: <strong id="countdown">--:--:--</strong>
      </div>
      <button class="refresh-btn" onclick="loadReport()" title="Refresh">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </header>
  <div class="content">
    <div id="main-content">
      <div class="loading"><div class="spinner"></div><div class="loading-text">Fetching latest report...</div></div>
    </div>
  </div>
</div>

<!-- Ticket Modal -->
<div class="modal-backdrop" id="ticket-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🎫 Jira Ticket Content</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="copyModalContent()">Copy All</button>
    </div>
  </div>
</div>

<script>
const STATUS_ICON = { PASS: '✓', FAIL: '✕', WARN: '!', SKIP: '–', UNAVAILABLE: '?' };

// ── Explain a failure in plain English ──
function explainFailure(check, clientName, environment) {
  const id = check.check_id;
  const desc = check.description;
  const details = check.details || '';

  const explanations = {
    'BR-ULA-05': {
      what: 'The Holdings & Folio API (`/mutual-fund/user-linked-accounts/holding-folio`) failed to return a valid response.',
      why: 'This could mean the API server is down, the authentication token expired mid-session, or the user account has no linked folios.',
      impact: 'All downstream checks that depend on holdings data (currentValue, units, NAV) are blocked.',
      action: 'Check API server health for the ' + environment + ' environment. Verify the QA user (9819582869) has active consents.',
    },
    'BR-ULA-06': {
      what: 'One or more holdings in the API response have data integrity issues — either negative closing units, zero NAV, or an empty holdings list.',
      why: 'Negative units suggest a data processing bug in the reconciliation pipeline. Zero NAV on an active holding means the NAV feed failed to update.',
      impact: 'Portfolio valuation will be incorrect. Any return calculations based on this data will be wrong.',
      action: 'Investigate the ETL pipeline for the affected ISINs. Check if the NAV feed from AMFI/registrar is working.',
    },
    'BR-REF-03': {
      what: 'NAV dates are older than 3 days, or the API response does not match the expected reference ISIN list.',
      why: 'Stale NAV indicates the data fetch job has not run recently. Missing ISINs suggest consents may have expired or FIP data is unavailable.',
      impact: 'Portfolio value shown to users is outdated and inaccurate.',
      action: 'Check the AA consent status for the QA user. Verify FIP data fetch jobs are running on schedule.',
    },
    'BR-STMT-01': {
      what: 'The Account Statement API (`/mutual-fund/user-account-statement`) returned an error or empty response.',
      why: 'The endpoint may be unavailable, or the date range query returned no data.',
      impact: 'Transaction history is unavailable. Users cannot view their buy/sell history.',
      action: 'Test the endpoint directly with the QA credentials. Check if the date range parameter is being accepted.',
    },
    'BR-STMT-02': {
      what: 'Transaction records are missing required fields or contain duplicate transaction IDs.',
      why: 'Missing fields indicate incomplete data from the registrar/FIP. Duplicate txnIds suggest a deduplication bug in the processing pipeline.',
      impact: 'Transaction records may appear corrupt or doubled to users.',
      action: 'Review the transaction ingestion pipeline. Check for deduplication logic in the ETL layer.',
    },
    'BR-STMT-03': {
      what: 'Transactions contain unrecognised type values not in the standard enum.',
      why: 'The registrar may have introduced a new transaction type that the system has not mapped.',
      impact: 'These transactions may not render correctly in the UI.',
      action: 'Review the new transaction type values and add them to the type mapping configuration.',
    },
    'BR-INS-01': {
      what: 'The Insights API (`/mutual-fund/insights`) returned an invalid structure or the `overallSummary` block is missing.',
      why: 'A breaking change in the API response schema, or the data aggregation service failed for this user.',
      impact: 'Portfolio summary screen will be blank or show incorrect data.',
      action: 'Check the insights aggregation service logs for the affected user ID.',
    },
    'BR-INS-02': {
      what: '`absoluteReturn` does not equal `currentValue − investedValue`, or the SOA data is inconsistent with the overall summary.',
      why: 'A calculation bug in the return computation service, or the SOA and main summary are pulling from different data snapshots.',
      impact: 'Return percentages shown to users will be incorrect.',
      action: 'Review the return calculation logic in the insights service. Check if SOA and summary queries are using the same data snapshot.',
    },
    'BR-INS-03': {
      what: 'Category, sub-category, or AMC distribution values do not sum to the total portfolio value.',
      why: 'A rounding error or a fund is being counted in multiple categories, or excluded from distribution calculations.',
      impact: 'The allocation chart shown to users will not add up to 100%.',
      action: 'Check the category mapping for each fund in the system. Look for funds with null or unmapped categories.',
    },
    'BR-INS-04': {
      what: 'Per-fund NAV data is stale, zero, or the computed value (units × NAV) does not match the reported currentValue.',
      why: 'The NAV feed for specific funds is delayed or errored. The valuation engine may not be recalculating after NAV updates.',
      impact: 'Individual fund valuations shown to users are inaccurate.',
      action: 'Check the NAV update job for the specific ISINs. Verify the valuation engine triggers after NAV ingestion.',
    },
    'BR-ANA-01': {
      what: 'The Analysis API (`/mutual-fund/analysis`) returned data inconsistent with the Insights API.',
      why: 'The two APIs may be reading from different database tables or cached at different times.',
      impact: 'Users may see different portfolio values on different screens.',
      action: 'Ensure both APIs read from the same data source and cache is invalidated consistently.',
    },
    'BR-ANA-02': {
      what: 'Scheme category or scheme type breakdowns in the Analysis API do not sum to the total portfolio value.',
      why: 'Same root cause as distribution mismatch — funds with null scheme categories or a rounding aggregation bug.',
      impact: 'Category allocation charts in the Analysis screen will be incorrect.',
      action: 'Review scheme category mapping. Check for null/unmapped schemeCategory values in the fund master data.',
    },
    'BR-AUTH-01': {
      what: 'The API accepted an invalid/expired token instead of rejecting it with a 401.',
      why: 'The JWT validation middleware may not be correctly verifying token signatures or expiry.',
      impact: 'Critical security vulnerability — unauthorised access to user data possible.',
      action: 'Immediately audit the authentication middleware. Verify JWT signature validation and expiry checks are enforced.',
    },
    'BR-GEN-07': {
      what: 'The API did not return a 4xx error when the `uniqueIdentifier` field was missing or empty.',
      why: 'Input validation is not enforced before processing the request.',
      impact: 'Malformed requests may cause unpredictable behaviour or expose system errors.',
      action: 'Add request validation to reject missing/empty `uniqueIdentifier` before processing.',
    },
    'BR-GEN-08': {
      what: 'A SQL injection payload in `uniqueIdentifier` did not return a safe 4xx error.',
      why: 'Input sanitisation may be insufficient, or the API is returning a 500 on injection attempts.',
      impact: 'Potential SQL injection vulnerability.',
      action: 'Review input sanitisation. Ensure parameterised queries are used throughout. Never return 500 on invalid input.',
    },
    'BR-GEN-10': {
      what: 'An unknown `uniqueIdentifier` returned unexpected data or a 500 error.',
      why: 'The API is not handling non-existent user lookups gracefully.',
      impact: 'Could expose internal error details. Should return empty data or 404.',
      action: 'Add a check for non-existent identifiers and return an empty result set or 404 instead of erroring.',
    },
  };

  const found = explanations[id];
  if (found) return found;

  // fallback
  return {
    what: `Check "${desc}" failed with result: ${details}`,
    why: 'The API response did not meet the expected validation criteria.',
    impact: 'Data quality for this check is compromised.',
    action: 'Review the API response and compare against expected values in the check details.',
  };
}

// ── Generate JIRA ticket content ──
function generateTicket(check, clientName, environment, runDate) {
  const exp = explainFailure(check, clientName, environment);
  const severity = check.status === 'FAIL' ? 'High' : 'Medium';
  const summary = `[${environment}][${check.check_id}] ${check.description} — ${clientName}`;

  const description =
`*Environment:* ${clientName} / ${environment}
*Check ID:* ${check.check_id}
*Run Date:* ${runDate}
*Severity:* ${severity}

h2. What failed
${exp.what}

h2. Observed result
${check.details || 'No details available'}

h2. Why this happens
${exp.why}

h2. Impact
${exp.impact}

h2. Suggested action
${exp.action}

h2. Reference
Detected by WealthScape MF API Sanity Agent (daily run at 07:00 IST).
Dashboard: https://singhaditya210100-dev.github.io/wealthscape-qa-dashboard`;

  return { summary, description, severity };
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true,
    timeZone: 'Asia/Kolkata'
  }) + ' IST';
}

function formatDuration(s, e) {
  if (!s || !e) return '—';
  const sec = Math.round((new Date(e) - new Date(s)) / 1000);
  return sec < 60 ? `${sec}s` : `${Math.floor(sec/60)}m ${sec%60}s`;
}

let _reportDate = '';

function renderCheck(check, clientName, environment) {
  const isFail = check.status === 'FAIL';
  const isWarn = check.status === 'WARN';
  const uid = `${clientName}-${environment}-${check.check_id}-${Math.random().toString(36).slice(2,7)}`;

  const ctasHtml = (isFail || isWarn) ? `
    <div class="check-ctas">
      <button class="cta-btn cta-details" onclick="toggleDetailPanel('detail-${uid}', 'ticket-${uid}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        View Details
      </button>
      <button class="cta-btn cta-ticket" onclick="toggleTicketPanel('ticket-${uid}', 'detail-${uid}', '${escStr(check.check_id)}', '${escStr(check.description)}', '${escStr(check.details||'')}', '${escStr(clientName)}', '${escStr(environment)}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V9l-4-4z"/><path d="M15 5v4h4M9 12h6M9 16h4"/></svg>
        Create Ticket
      </button>
    </div>
    <div class="check-detail-panel" id="detail-${uid}">
      ${renderDetailPanel(check, clientName, environment)}
    </div>
    <div class="ticket-panel" id="ticket-${uid}"></div>` : '';

  return `
    <div class="check-item">
      <div class="check-main">
        <div class="check-dot ${check.status}">${STATUS_ICON[check.status] || '?'}</div>
        <div class="check-body">
          <div class="check-id">${check.check_id}</div>
          <div class="check-desc">${check.description}</div>
          ${check.details ? `<div class="check-detail">${check.details}${check.tolerance ? ` &nbsp;·&nbsp; Tolerance: ${check.tolerance}` : ''}</div>` : ''}
        </div>
      </div>
      ${ctasHtml}
    </div>`;
}

function renderDetailPanel(check, clientName, environment) {
  const exp = explainFailure(check, clientName, environment);
  return `
    <div class="detail-panel-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      Failure Analysis — ${check.check_id}
    </div>
    <div class="detail-panel-body">
      <div class="detail-section">
        <div class="detail-label">What failed</div>
        <div class="detail-value">${exp.what}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Observed result</div>
        <div class="detail-value mono">${check.details || 'No details available'}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Why this happens</div>
        <div class="detail-value">${exp.why}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Impact</div>
        <div class="detail-value">${exp.impact}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Suggested action</div>
        <div class="detail-value">${exp.action}</div>
      </div>
    </div>`;
}

function escStr(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function toggleDetailPanel(detailId, ticketId) {
  const dp = document.getElementById(detailId);
  const tp = document.getElementById(ticketId);
  if (!dp) return;
  const isOpen = dp.classList.contains('open');
  dp.classList.toggle('open');
  if (!isOpen && tp) tp.classList.remove('open');
}

function toggleTicketPanel(ticketId, detailId, checkId, desc, details, clientName, environment) {
  const tp = document.getElementById(ticketId);
  const dp = document.getElementById(detailId);
  if (!tp) return;
  const isOpen = tp.classList.contains('open');
  if (!isOpen) {
    // Build ticket content
    const check = { check_id: checkId, description: desc, details: details };
    const ticket = generateTicket(check, clientName, environment, _reportDate);
    tp.innerHTML = `
      <div class="ticket-panel-header">
        <span>🎫 Jira Ticket Draft</span>
        <span style="font-size:10px;font-weight:500;opacity:0.7">${clientName} / ${environment}</span>
      </div>
      <div class="ticket-panel-body">
        <div class="ticket-field">
          <div class="ticket-field-label">Summary</div>
          <div class="ticket-field-value" id="ts-${ticketId}">${ticket.summary}</div>
        </div>
        <div class="ticket-field">
          <div class="ticket-field-label">Priority</div>
          <div class="ticket-field-value">${ticket.severity}</div>
        </div>
        <div class="ticket-field">
          <div class="ticket-field-label">Description (Jira markup)</div>
          <div class="ticket-field-value" id="td-${ticketId}" style="font-family:monospace;font-size:11px">${ticket.description}</div>
        </div>
        <div class="ticket-actions">
          <button class="cta-btn cta-copy" id="copy-sum-${ticketId}" onclick="copyField('ts-${ticketId}', 'copy-sum-${ticketId}')">Copy Summary</button>
          <button class="cta-btn cta-copy" id="copy-desc-${ticketId}" onclick="copyField('td-${ticketId}', 'copy-desc-${ticketId}')">Copy Description</button>
        </div>
      </div>`;
    if (dp) dp.classList.remove('open');
  }
  tp.classList.toggle('open');
}

function copyField(elId, btnId) {
  const el = document.getElementById(elId);
  const btn = document.getElementById(btnId);
  if (!el || !btn) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('cta-copied');
    btn.classList.remove('cta-copy');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('cta-copied');
      btn.classList.add('cta-copy');
    }, 2000);
  });
}

function closeModal() { document.getElementById('ticket-modal').classList.remove('open'); }
function copyModalContent() {
  const body = document.getElementById('modal-body');
  navigator.clipboard.writeText(body.innerText);
}

function renderPhase(phase, phaseIdx, clientIdx, clientName, environment) {
  const id = `checks-${clientIdx}-${phaseIdx}`;
  const pct = phase.total > 0 ? phase.passed / phase.total * 100 : 0;
  const checksHtml = phase.checks.map(c => renderCheck(c, clientName, environment)).join('');
  return `
    <div class="phase-row" onclick="toggleChecks('${id}', this)">
      <div class="phase-num ${phase.status}">P${phase.phase_number}</div>
      <span class="phase-name">${phase.phase_name}</span>
      <div class="phase-progress"><div class="phase-progress-fill ${phase.status}" style="width:${pct}%"></div></div>
      <span class="phase-count">${phase.passed}/${phase.total}</span>
      <svg class="phase-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="checks-list" id="${id}">
      ${checksHtml || '<div style="padding:10px 56px;font-size:12px;color:#667085">No checks recorded</div>'}
    </div>`;
}

function renderClient(client, idx) {
  const passRate = client.total_checks > 0 ? Math.round(client.passed / client.total_checks * 100) : 0;
  const duration = formatDuration(client.run_started, client.run_completed);
  const barStatus = client.failed > 0 ? 'FAIL' : client.warnings > 0 ? 'WARN' : 'PASS';
  const phasesHtml = client.phases.map((p, i) => renderPhase(p, i, idx, client.name, client.environment)).join('');
  return `
    <div class="client-card">
      <div class="card-header">
        <div class="card-title-wrap">
          <span class="card-title">${client.name}</span>
          <span class="env-badge ${client.environment}">${client.environment}</span>
        </div>
        <span class="status-badge ${client.status}">${client.status}</span>
      </div>
      <div class="card-stats">
        <div class="stat-cell"><span class="num total">${client.total_checks}</span><span class="lbl">Checks</span></div>
        <div class="stat-cell"><span class="num pass">${client.passed}</span><span class="lbl">Passed</span></div>
        <div class="stat-cell"><span class="num warn">${client.warnings}</span><span class="lbl">Warnings</span></div>
        <div class="stat-cell"><span class="num fail">${client.failed}</span><span class="lbl">Failed</span></div>
        <div class="stat-cell"><span class="num purple">${passRate}%</span><span class="lbl">Pass Rate</span></div>
        <div class="stat-cell"><span class="num total" style="font-size:14px">${duration}</span><span class="lbl">Duration</span></div>
      </div>
      <div class="pass-bar-wrap">
        <div class="pass-bar"><div class="pass-bar-fill ${barStatus}" style="width:${passRate}%"></div></div>
        <span class="pass-bar-label">${client.passed} of ${client.total_checks} checks passed</span>
      </div>
      <div class="phases-list">${phasesHtml}</div>
    </div>`;
}

function renderDashboard(data) {
  _reportDate = formatDate(data.run_started);
  const overallStatus = data.overall_status || 'UNAVAILABLE';
  const passRate = data.total_checks > 0 ? Math.round(data.passed / data.total_checks * 100) : 0;
  const icon = { PASS: '✓', FAIL: '✕', WARN: '!', UNAVAILABLE: '?' }[overallStatus] || '?';
  const title = { PASS: 'All Checks Passed', FAIL: 'Failures Detected', WARN: 'Warnings Found', UNAVAILABLE: 'No Data' }[overallStatus] || overallStatus;
  document.getElementById('last-updated').textContent = `Last run: ${_reportDate}`;
  return `
    <div class="status-banner ${overallStatus}">
      <div class="banner-left">
        <div class="banner-icon">${icon}</div>
        <div>
          <div class="banner-title">${title}</div>
          <div class="banner-sub">Run ${data.run_id || '—'} &nbsp;·&nbsp; ${_reportDate} &nbsp;·&nbsp; ${formatDuration(data.run_started, data.run_completed)}</div>
        </div>
      </div>
      <div class="banner-stats">
        <div class="banner-stat"><span class="val neutral">${data.total_checks||0}</span><span class="lbl">Total</span></div>
        <div class="banner-stat"><span class="val pass">${data.passed||0}</span><span class="lbl">Passed</span></div>
        <div class="banner-stat"><span class="val warn">${data.warnings||0}</span><span class="lbl">Warnings</span></div>
        <div class="banner-stat"><span class="val fail">${data.failed||0}</span><span class="lbl">Failed</span></div>
        <div class="banner-stat"><span class="val purple">${passRate}%</span><span class="lbl">Pass Rate</span></div>
      </div>
    </div>
    <div class="section-header">
      <div class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#344054" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Environment Results
      </div>
      <span style="font-size:12px;color:#667085">${(data.clients||[]).length} environment${(data.clients||[]).length!==1?'s':''} tested</span>
    </div>
    <div class="clients-grid">${(data.clients||[]).map(renderClient).join('')}</div>`;
}

function toggleChecks(id, row) {
  document.getElementById(id)?.classList.toggle('open');
  row.querySelector('.phase-chevron')?.classList.toggle('open');
}

function updateCountdown() {
  const ist = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
  const next = new Date(ist); next.setHours(7,0,0,0);
  if (ist >= next) next.setDate(next.getDate()+1);
  const d = next - ist;
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
  document.getElementById('countdown').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateCountdown, 1000); updateCountdown();

async function loadReport() {
  try {
    const res = await fetch('reports/latest_report.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('main-content').innerHTML = renderDashboard(data);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-card">
        <div style="font-size:32px;margin-bottom:12px">📋</div>
        <div style="font-size:16px;font-weight:600;color:#101828;margin-bottom:6px">No report data yet</div>
        <div style="font-size:13px;color:#667085">The agent runs daily at 07:00 IST. Reports appear here automatically.<br><small style="color:#98A2B3">${err.message}</small></div>
      </div>`;
  }
}
loadReport();
setInterval(loadReport, 5*60*1000);
</script>
