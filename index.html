<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthScape QA · Finfactor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #6B2FE0; --purple-light: #EDE9FB; --purple-dark: #4A1FA3;
  --green: #12B76A; --green-light: #ECFDF5;
  --red: #F04438; --red-light: #FEF3F2; --red-mid: #FDA29B;
  --amber: #F79009; --amber-light: #FFFAEB;
  --gray-50: #F9FAFB; --gray-100: #F2F4F7; --gray-200: #EAECF0; --gray-300: #D0D5DD;
  --gray-400: #98A2B3; --gray-500: #667085; --gray-700: #344054; --gray-900: #101828;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(16,24,40,0.05);
  --shadow-md: 0 4px 8px -2px rgba(16,24,40,0.1), 0 2px 4px -2px rgba(16,24,40,0.06);
  --shadow-lg: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.03);
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; }

.sidebar { width: 240px; min-height: 100vh; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--purple); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-icon svg { width: 18px; height: 18px; fill: white; }
.logo-text { font-size: 16px; font-weight: 700; }
.sidebar-nav { padding: 12px; flex: 1; }
.nav-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 8px; margin: 16px 0 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--gray-700); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: var(--purple-light); color: var(--purple); }
.nav-item.active svg { stroke: var(--purple); }
.nav-item svg { width: 18px; height: 18px; stroke: var(--gray-500); stroke-width: 1.8; fill: none; flex-shrink: 0; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--gray-200); font-size: 12px; color: var(--gray-400); text-align: center; }

.main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 18px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.next-run-badge { background: var(--purple-light); color: var(--purple); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
.dot { width: 6px; height: 6px; background: var(--purple); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.last-updated { font-size: 12px; color: var(--gray-500); }
.refresh-btn { width: 34px; height: 34px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.refresh-btn:hover { background: var(--gray-100); }
.refresh-btn svg { width: 16px; height: 16px; stroke: var(--gray-500); stroke-width: 2; fill: none; }

.content { padding: 24px 28px; flex: 1; }

.status-banner { border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; border: 1px solid; }
.status-banner.PASS { background: var(--green-light); border-color: #A9EFC5; }
.status-banner.FAIL { background: var(--red-light); border-color: #FECDCA; }
.status-banner.WARN { background: var(--amber-light); border-color: #FEC84B; }
.status-banner.UNAVAILABLE { background: var(--gray-100); border-color: var(--gray-300); }
.banner-left { display: flex; align-items: center; gap: 14px; }
.banner-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.PASS .banner-icon{background:#DCFCE7} .FAIL .banner-icon{background:#FEE2E2} .WARN .banner-icon{background:#FEF3C7}
.banner-title { font-size: 16px; font-weight: 700; }
.banner-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.banner-stats { display: flex; gap: 24px; flex-wrap: wrap; }
.bstat { text-align: center; }
.bstat .val { font-size: 20px; font-weight: 700; display: block; }
.bstat .val.pass{color:var(--green)} .bstat .val.fail{color:var(--red)} .bstat .val.warn{color:var(--amber)} .bstat .val.n{color:var(--gray-900)} .bstat .val.p{color:var(--purple)}
.bstat .lbl { font-size: 11px; color: var(--gray-500); }

.section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 14px; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 8px; }

.clients-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(540px, 1fr)); gap: 16px; margin-bottom: 24px; }
.client-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
.client-card:hover { box-shadow: var(--shadow-md); }
.card-hdr { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-100); }
.card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.env-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
.env-badge.UAT { background: #EFF8FF; color: #1570EF; border: 1px solid #B2DDFF; }
.env-badge.PROD { background: var(--amber-light); color: #B54708; border: 1px solid #FEC84B; }
.sbadge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.sbadge.PASS{background:var(--green-light);color:#027A48;border:1px solid #A9EFC5}
.sbadge.FAIL{background:var(--red-light);color:#B42318;border:1px solid #FECDCA}
.sbadge.WARN{background:var(--amber-light);color:#B54708;border:1px solid #FEC84B}
.sbadge.SKIP,.sbadge.UNAVAILABLE{background:var(--gray-100);color:var(--gray-500);border:1px solid var(--gray-200)}

.card-stats { display: flex; border-bottom: 1px solid var(--gray-100); }
.stat-cell { flex: 1; padding: 12px 0; text-align: center; border-right: 1px solid var(--gray-100); }
.stat-cell:last-child { border-right: none; }
.stat-cell .num { font-size: 18px; font-weight: 700; display: block; }
.stat-cell .num.pass{color:var(--green)} .stat-cell .num.fail{color:var(--red)} .stat-cell .num.warn{color:var(--amber)} .stat-cell .num.tot{color:var(--gray-900)} .stat-cell .num.pur{color:var(--purple)}
.stat-cell .lbl { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }

.pass-bar-wrap { padding: 8px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; }
.pass-bar { flex: 1; height: 5px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
.pbf { height: 100%; border-radius: 4px; transition: width 0.6s; }
.pbf.PASS{background:var(--green)} .pbf.WARN{background:var(--amber)} .pbf.FAIL{background:var(--red)}
.pass-bar-lbl { font-size: 11px; color: var(--gray-500); white-space: nowrap; }

.phase-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--gray-50); }
.phase-row:hover { background: var(--gray-50); }
.pnum { width: 24px; height: 24px; border-radius: 6px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--gray-500); flex-shrink: 0; }
.pnum.PASS{background:var(--green-light);color:#027A48} .pnum.FAIL{background:var(--red-light);color:#B42318} .pnum.WARN{background:var(--amber-light);color:#B54708}
.phase-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-700); }
.phase-prog { width: 100px; height: 4px; background: var(--gray-100); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.ppf { height: 100%; border-radius: 3px; }
.ppf.PASS{background:var(--green)} .ppf.FAIL{background:var(--red)} .ppf.WARN{background:var(--amber)}
.phase-cnt { font-size: 11px; color: var(--gray-500); width: 40px; text-align: right; flex-shrink: 0; }
.chevron { color: var(--gray-400); flex-shrink: 0; transition: transform 0.2s; }
.chevron.open { transform: rotate(90deg); }

.checks-list { display: none; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
.checks-list.open { display: block; }

.check-item { border-bottom: 1px solid var(--gray-100); }
.check-item:last-child { border-bottom: none; }
.check-main { display: flex; gap: 10px; padding: 10px 20px 10px 56px; align-items: flex-start; }
.cdot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.cdot.PASS{background:var(--green-light);color:#027A48} .cdot.FAIL{background:var(--red-light);color:#B42318} .cdot.WARN{background:var(--amber-light);color:#B54708} .cdot.SKIP,.cdot.UNAVAILABLE{background:var(--gray-100);color:var(--gray-500)}
.cbody { flex: 1; min-width: 0; }
.cid { font-size: 10px; font-weight: 600; color: var(--purple); margin-bottom: 1px; }
.cdesc { font-size: 12px; color: var(--gray-700); font-weight: 500; }
.cdetail { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

.check-ctas { display: flex; gap: 6px; padding: 0 20px 10px 84px; flex-wrap: wrap; }
.cta { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; background: none; font-family: inherit; }
.cta-d { color: #B42318; border-color: var(--red-mid); background: var(--red-light); }
.cta-d:hover { background: #FEE2E2; }
.cta-t { color: var(--purple); border-color: #C4B5FD; background: var(--purple-light); }
.cta-t:hover { background: #DDD6FE; }
.cta-c { color: var(--gray-700); border-color: var(--gray-300); background: var(--white); }
.cta-c:hover { background: var(--gray-100); }
.cta-ok { color: #027A48; border-color: #A9EFC5; background: var(--green-light); }

/* Detail panel */
.detail-panel { display: none; margin: 0 20px 10px 84px; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); }
.detail-panel.open { display: block; }
.dp-hdr { padding: 10px 14px; background: #FEF3F2; border-bottom: 1px solid #FECDCA; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: #B42318; }
.dp-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.dp-sec .dp-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray-400); margin-bottom: 4px; }
.dp-sec .dp-val { font-size: 12px; color: var(--gray-700); line-height: 1.5; }
.dp-sec .dp-val.mono { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; background: var(--gray-50); padding: 6px 8px; border-radius: 4px; border: 1px solid var(--gray-200); word-break: break-all; }
.dp-exact { background: #FEF3F2; border: 1px solid #FECDCA; border-radius: 6px; padding: 8px 10px; }
.dp-exact .dp-lbl { color: #B42318; }
.dp-exact .dp-val { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: #B42318; font-weight: 600; word-break: break-all; }
.exact-row { display: flex; gap: 8px; padding: 3px 0; border-bottom: 1px solid rgba(240,68,56,0.1); align-items: baseline; }
.exact-row:last-child { border-bottom: none; }
.exact-row.summary { padding: 4px 0 6px; border-bottom: 1px solid rgba(240,68,56,0.2); margin-bottom: 2px; }
.exact-lbl { font-size: 10px; font-weight: 700; color: rgba(180,35,24,0.7); white-space: nowrap; flex-shrink: 0; min-width: 120px; }
.exact-val { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: #B42318; font-weight: 600; word-break: break-all; }
.exact-val.count { font-size: 13px; font-weight: 800; }
.exact-val.full { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: #B42318; }

/* Ticket panel */
.ticket-panel { display: none; margin: 0 20px 10px 84px; background: var(--white); border: 1px solid #C4B5FD; border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); }
.ticket-panel.open { display: block; }
.tp-hdr { padding: 10px 14px; background: var(--purple-light); border-bottom: 1px solid #C4B5FD; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--purple); }
.tp-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.tf-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray-400); margin-bottom: 3px; }
.tf-val { font-size: 12px; color: var(--gray-700); background: var(--gray-50); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--gray-200); white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
.tf-val.mono { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; }
.tp-actions { display: flex; gap: 6px; padding-top: 2px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--gray-200); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 40px; text-align: center; }

@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.clients-grid{grid-template-columns:1fr}}
</style>
</head>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="logo-text">Finfactor</span>
  </div>
  <nav class="sidebar-nav">

      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
    </div>

      <div class="last-updated" id="last-updated">Loading...</div>

    </div>
  </header>

<script>
const SI = { PASS:'✓', FAIL:'✕', WARN:'!', SKIP:'–', UNAVAILABLE:'?' };
let _reportDate = '';

// ── Format pipe-separated detail string into readable rows ──
function formatExact(exact) {
  if (!exact || exact === 'No details captured') return '<em style="color:var(--gray-400)">No data captured</em>';
  
  const parts = exact.split(' | ').map(p => p.trim()).filter(Boolean);
  if (parts.length <= 1) return `<span>${esc2(exact)}</span>`;
  
  // Check if first part is a count summary (e.g. "Stale holdings: 3")
  const firstIsCount = /^[A-Za-z\s]+:\s*\d+$/.test(parts[0]);
  
  const rows = parts.map((p, i) => {
    // Split on first colon to get label:value
    const colonIdx = p.indexOf(':');
    if (colonIdx === -1) return `<div class="exact-row"><span class="exact-val full">${esc2(p)}</span></div>`;
    const label = p.slice(0, colonIdx).trim();
    const val = p.slice(colonIdx + 1).trim();
    // First row count summary gets different styling
    if (i === 0 && firstIsCount) return `<div class="exact-row summary"><span class="exact-lbl">${esc2(label)}</span><span class="exact-val count">${esc2(val)}</span></div>`;
    return `<div class="exact-row"><span class="exact-lbl">${esc2(label)}</span><span class="exact-val">${esc2(val)}</span></div>`;
  });
  
  return rows.join('');
}

function esc2(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Description-based failure explainer with exact data values ──
function explainFailure(check) {
  const desc = check.description || '';
  const details = check.details || '';

  function pv() {  // parse details key:value -> readable list
    return details.split('|').map(p => {
      const [k,...v] = p.split(':');
      return k && v.length ? `<strong>${k.trim()}:</strong> ${v.join(':').trim()}` : p.trim();
    }).filter(Boolean).join(' &nbsp;·&nbsp; ');
  }

  const D = { // shorthand
    exact: details || 'No details captured',
    pv: pv(),
  };

  if (desc.includes('Holdings API reachable') || desc.includes('Transactions API reachable') || desc.includes('Insights API reachable') || desc.includes('Analysis API reachable'))
    return { what:`The API failed to return HTTP 200.`, exact:D.exact, why:`Server may be down, auth token expired mid-session, or the user has no data in this environment.`, impact:`All downstream checks for this phase are blocked.`, action:`Check API server health. Verify QA user (9819582869) has active consents in this environment.` };

  if (desc.includes('currentValue > 0'))
    return { what:`Portfolio currentValue is zero or negative.`, exact:D.pv, why:`No active holdings with non-zero values, or the valuation engine failed.`, impact:`Portfolio appears empty to users despite active investments.`, action:`Check the valuation job for this user. Verify holdings have non-zero closingUnits and valid NAV.` };

  if (desc.includes('Holdings list non-empty'))
    return { what:`The API returned an empty holdings array.`, exact:D.pv, why:`User may have no linked accounts, or FIP data fetch failed.`, impact:`No individual fund data is available — portfolio screen will be blank.`, action:`Verify QA user has active linked accounts and consents. Review FIP data fetch logs.` };

  if (desc.includes('closingUnits >= 0'))
    return { what:`One or more holdings have negative closing units.`, exact:D.exact, why:`A redemption was processed without a corresponding purchase, or the units reconciliation has a bug.`, impact:`Negative units cause incorrect portfolio valuation and may crash downstream calculations.`, action:`Identify ISINs with negative units from the details. Review the transaction reconciliation pipeline for those accounts.` };

  if (desc.includes('nav > 0') || desc.includes('currentNav > 0'))
    return { what:`Active holdings (with units > 0) have a NAV of zero or negative.`, exact:D.exact, why:`NAV feed from AMFI or the registrar failed to update for these specific funds.`, impact:`These funds show ₹0 value despite the user holding units, making the portfolio total wrong.`, action:`Identify the affected ISINs from the details. Check the NAV ingestion job for those funds.` };

  if (desc.includes('NAV date not stale') || desc.includes('NAV date fresh') || desc.includes('within 3 days'))
    return { what:`Holdings have NAV dates older than 3 days.`, exact:D.exact, why:`The daily NAV fetch job has not run for these ISINs, or the FIP is not providing updated data.`, impact:`Portfolio values shown to users are stale and inaccurate.`, action:`Check the scheduled NAV update job. Verify connectivity to the NAV data source for the specific ISINs listed above.` };

  if (desc.includes('[PROD] All reference ISINs'))
    return { what:`ISINs from the reference portfolio are missing from the API response.`, exact:D.exact, why:`AA consents may have expired for the FIPs holding these funds, or the data fetch failed.`, impact:`The QA reference portfolio is incomplete — some funds are invisible in the API.`, action:`Check AA consent status for the missing ISINs listed above. Re-trigger data fetch for those FIPs.` };

  if (desc.includes('[PROD] Per-ISIN closingUnits'))
    return { what:`Closing units in the API differ from the reference snapshot.`, exact:D.exact, why:`New transactions since the snapshot, or a unit reconciliation error.`, impact:`Unit counts are inconsistent with expected reference values.`, action:`Check if recent transactions explain the delta shown above. If no recent activity, investigate the reconciliation pipeline.` };

  if (desc.includes('[PROD] currentValue within'))
    return { what:`Live portfolio value deviates more than 20% from the reference snapshot.`, exact:D.pv, why:`Large NAV movements, new investments/redemptions since snapshot, or a valuation error.`, impact:`Large unexplained deviation may indicate a data quality issue beyond normal market movement.`, action:`Review recent transactions and NAV changes. If no market explanation exists, investigate the valuation engine.` };

  if (desc.includes('Required fields present'))
    return { what:`Transaction records are missing required fields (isin, amc, nav, type, or amount).`, exact:D.pv, why:`Incomplete data from the registrar or a parsing error in the ingestion pipeline.`, impact:`Incomplete transactions may not display correctly and could cause UI errors.`, action:`Identify the specific records using the count above. Review the data ingestion pipeline for the relevant registrar.` };

  if (desc.includes('txnId unique'))
    return { what:`Multiple transactions share the same txnId — duplicates detected.`, exact:D.pv, why:`Deduplication bug in the transaction processing pipeline, or the same transaction was ingested multiple times.`, impact:`Users will see doubled transactions in their statement.`, action:`Review the deduplication logic in the transaction ingestion service. Audit why ${details.match(/Duplicates: (\d+)/)?.[1] || 'some'} records share IDs.` };

  if (desc.includes('Transaction types'))
    return { what:`Transaction records contain unrecognised type values.`, exact:D.exact, why:`A new transaction type was introduced by the registrar that hasn't been added to the type mapping.`, impact:`These transactions won't be categorised correctly in the UI.`, action:`Add the unknown type values to the transaction type enum configuration.` };

  if (desc.includes('Amount ≈') || desc.includes('Amount approx'))
    return { what:`Transaction amount does not match units × NAV.`, exact:D.pv, why:`Stamp duty or tax may be included in the amount field, or a data error in units/NAV.`, impact:`Transaction amount accuracy cannot be verified.`, action:`Check if charges are embedded in the amount. Review the calculation tolerance in the config.` };

  if (desc.includes('Insights API returns valid structure'))
    return { what:`The Insights API response is missing the overallSummary or holdings blocks.`, exact:D.exact, why:`The aggregation service may have failed for this user, or a breaking schema change was deployed.`, impact:`Portfolio summary screen will be blank or show partial data.`, action:`Check the insights aggregation service logs for user 9819582869. Compare the live response schema against the API spec.` };

  if (desc.includes('holdings[] count') || desc.includes('holdings list count'))
    return { what:`The holdings[] array length doesn't match the totalHoldings field.`, exact:D.pv, why:`totalHoldings is a pre-computed count field that may be out of sync with the actual holdings list.`, impact:`Holding count mismatch causes confusion in the UI.`, action:`Verify the totalHoldings field is computed from the same query that populates the holdings[] array.` };

  if (desc.includes('absoluteReturn = currentValue') && !desc.includes('Per-holding'))
    return { what:`Portfolio-level absoluteReturn ≠ currentValue − investedValue.`, exact:D.pv, why:`Return calculation service is using a different formula or reading a stale investedValue.`, impact:`The overall return % shown to users is wrong.`, action:`Review the return calculation logic. Check if investedValue is read from the correct source and is current.` };

  if (desc.includes('Per-holding absoluteReturn'))
    return { what:`Individual fund holdings have incorrect absoluteReturn values.`, exact:D.exact, why:`Per-fund return calculation doesn't match currentValue − investedValue for those funds.`, impact:`Individual fund return percentages are inaccurate.`, action:`Review how investedValue is tracked for funds with zero investedValue (common for SOA-only funds).` };

  if (desc.includes('SOA') && desc.includes('currentValue'))
    return { what:`SOA + Demat sub-total currentValue doesn't match the overallSummary currentValue.`, exact:D.pv, why:`SOA and Demat aggregations are reading from a different data snapshot than the main summary.`, impact:`Internal data inconsistency within a single API response — numbers don't add up.`, action:`Ensure SOA and Demat aggregations use the same data snapshot timestamp as the overallSummary calculation.` };

  if (desc.includes('SOA') && desc.includes('totalHoldings'))
    return { what:`SOA + Demat totalHoldings doesn't match the overallSummary totalHoldings.`, exact:D.pv, why:`Holdings are counted differently between the SOA view and the main summary.`, impact:`Inconsistent holding counts within the same API response.`, action:`Review how SOA vs overall holdings are counted. Check for filtering differences (e.g. zero-unit holdings).` };

  if (desc.includes('categoryDistribution sums'))
    return { what:`Sum of category values (Equity + Debt + Hybrid) ≠ total portfolio currentValue.`, exact:D.pv, why:`A fund is either uncategorised (null category) or being counted in multiple categories.`, impact:`The allocation pie chart won't sum to 100%.`, action:`Find funds with null or unmapped category values. Check for double-counting in the aggregation query.` };

  if (desc.includes('categoryDistribution percentages'))
    return { what:`Category distribution percentages don't sum to ~100%.`, exact:D.exact, why:`Rounding errors in percentage calculation, or a fund is excluded from the distribution.`, impact:`The allocation chart percentages will appear incorrect to users.`, action:`Review the percentage rounding logic. Ensure all funds are included in the distribution calculation.` };

  if (desc.includes('subCategoryDistribution'))
    return { what:`Sub-category distribution total ≠ portfolio currentValue.`, exact:D.pv, why:`A fund is missing a sub-category mapping and is excluded from the distribution.`, impact:`Sub-category breakdown chart is incomplete or inaccurate.`, action:`Identify funds with null subCategory in the fund master data. Add the missing mappings.` };

  if (desc.includes('AMC distribution'))
    return { what:`AMC-wise value sum ≠ total portfolio currentValue.`, exact:D.pv, why:`A fund is missing an AMC mapping or is assigned to an AMC not in the distribution list.`, impact:`AMC allocation breakdown chart is inaccurate.`, action:`Check for funds with null amcName. Verify the AMC distribution aggregation query.` };

  if (desc.includes('Market cap distribution'))
    return { what:`Market cap distribution percentages (Large/Mid/Small) don't sum to ~100%.`, exact:D.exact, why:`Some funds may not have market cap data, or the percentage rounding is off.`, impact:`Market cap allocation view is inaccurate.`, action:`Check for funds without market cap classification. Review the percentage calculation logic.` };

  if (desc.includes('Per-holding NAV date'))
    return { what:`Specific fund holdings have NAV dates older than 3 days.`, exact:D.exact, why:`The NAV update job has not processed these specific ISINs recently.`, impact:`These specific fund valuations are stale and inaccurate.`, action:`Check the NAV ingestion pipeline specifically for the ISINs listed above.` };

  if (desc.includes('currentValue ≈ totalUnits'))
    return { what:`Reported currentValue doesn't match totalUnits × currentNav for some holdings.`, exact:D.exact, why:`The valuation engine may not have recalculated after the last NAV update.`, impact:`Individual fund values shown to users are inconsistent with NAV × units math.`, action:`Trigger a recalculation of holding values. Verify the valuation engine runs after each NAV update.` };

  if (desc.includes('Analysis currentValue consistent'))
    return { what:`Analysis API currentValue differs from Insights API currentValue.`, exact:D.pv, why:`Both APIs may read from different database replicas or use different cache layers.`, impact:`Users see different portfolio totals on different screens.`, action:`Ensure both APIs read from the same data source and invalidate caches consistently.` };

  if (desc.includes('All 3 APIs reachable') || desc.includes('consistent across 3 APIs'))
    return { what:`Portfolio values or holding counts differ across the three API endpoints.`, exact:D.pv, why:`APIs read from different data replicas or aggregate data differently.`, impact:`Users see different portfolio totals depending on which screen they're on.`, action:`Standardise the data source for all three endpoints. Ensure cache invalidation is consistent after data updates.` };

  if (desc.includes('schemeCategory sums'))
    return { what:`Scheme category breakdown values don't sum to the Analysis API currentValue.`, exact:D.pv, why:`A fund has a null or unmapped schemeCategory in the fund master data.`, impact:`Category breakdown chart in the Analysis screen is incomplete.`, action:`Find funds with null schemeCategory. Update fund master data with correct scheme categories.` };

  if (desc.includes('schemeType sums'))
    return { what:`Scheme type breakdown (Equity/Debt/Hybrid/Other) doesn't sum to Analysis currentValue.`, exact:D.pv, why:`A fund has a null or unmapped schemeType value.`, impact:`Scheme type allocation view is incomplete or inaccurate.`, action:`Identify funds with missing schemeType. Update the fund master mappings.` };

  if (desc.includes('Invalid token') || desc.includes('BR-AUTH-01'))
    return { what:`The API accepted an invalid token instead of returning 401.`, exact:`Expected: HTTP 401 | Got: ${details}`, why:`JWT signature validation or expiry check is not enforced in the auth middleware.`, impact:`🚨 Critical security vulnerability — unauthorised users may access account data.`, action:`Immediately audit the authentication middleware. Enforce JWT signature and expiry validation on every request.` };

  if (desc.includes('Missing') && desc.includes('uniqueIdentifier'))
    return { what:`API didn't return 4xx when uniqueIdentifier was missing or empty.`, exact:`Expected: HTTP 400/401 | Got: ${details}`, why:`Input validation is not rejecting malformed requests before processing.`, impact:`Malformed requests reach the processing layer and may cause unpredictable behaviour.`, action:`Add request validation to require a non-empty uniqueIdentifier before processing.` };

  if (desc.includes('SQLi') || desc.includes('injection'))
    return { what:`SQL injection payload did not receive a safe 4xx error.`, exact:`Expected: HTTP 4xx | Got: ${details}`, why:`Input is not being sanitised, or the API returns 500 on injection attempts.`, impact:`🚨 Potential SQL injection vulnerability.`, action:`Use parameterised queries throughout. Sanitise all inputs. Never expose 500 errors to clients on bad input.` };

  if (desc.includes('Unknown identifier') || desc.includes('no data leak'))
    return { what:`A random uniqueIdentifier returned unexpected data or a 500 error.`, exact:D.exact, why:`The API is not handling non-existent user lookups gracefully.`, impact:`Could expose internal error details or stack traces to clients.`, action:`Return an empty result or 404 for non-existent identifiers. Never return 500 on user-controlled input errors.` };

  // fallback
  return { what:`Check "${desc}" failed validation.`, exact:D.exact, why:`The API response did not meet the expected criteria.`, impact:`Data quality for this metric is compromised.`, action:`Review the observed value above and compare against the check definition.` };
}

function generateTicket(check, clientName, environment) {
  const exp = explainFailure(check);
  const sev = check.status === 'FAIL' ? 'High' : 'Medium';
  const summary = `[${environment}][${check.check_id}] ${check.description} — ${clientName}`;
  const description =
`*Environment:* ${clientName} / ${environment}
*Check ID:* ${check.check_id}
*Run Date:* ${_reportDate}
*Severity:* ${sev}

h2. What failed
${exp.what}

h2. Exact failing data
${check.details || 'No details captured'}

h2. Root cause
${exp.why}

h2. User impact
${exp.impact}

h2. Suggested action
${exp.action}

----
Detected by WealthScape MF API Sanity Agent (daily 07:00 IST)
Dashboard: https://singhaditya210100-dev.github.io/wealthscape-qa-dashboard`;
  return { summary, description, sev };
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function renderCheck(check, clientName, environment) {
  const isBad = check.status === 'FAIL' || check.status === 'WARN';
  const uid = `${clientName.replace(/\s/g,'')}-${environment}-${Math.random().toString(36).slice(2,6)}`;

  let ctasHtml = '';
  if (isBad) {
    const exp = explainFailure(check);
    ctasHtml = `
      <div class="check-ctas">
        <button class="cta cta-d" onclick="togglePanel('dp-${uid}','tp-${uid}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          View Details
        </button>
        <button class="cta cta-t" onclick="openTicket('tp-${uid}','dp-${uid}','${escAttr(check.check_id)}','${escAttr(check.description)}','${escAttr(check.details||'')}','${escAttr(clientName)}','${escAttr(environment)}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V9l-4-4z"/><path d="M15 5v4h4M9 12h6M9 16h4"/></svg>
          Create Ticket
        </button>
      </div>
      <div class="detail-panel" id="dp-${uid}">
        <div class="dp-hdr"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>Failure Analysis — ${esc(check.check_id)}</div>
        <div class="dp-body">
          <div class="dp-sec"><div class="dp-lbl">What failed</div><div class="dp-val">${exp.what}</div></div>
          <div class="dp-sec dp-exact"><div class="dp-lbl">Exact failing data</div><div class="dp-val">${formatExact(exp.exact)}</div></div>
          <div class="dp-sec"><div class="dp-lbl">Why this happens</div><div class="dp-val">${exp.why}</div></div>
          <div class="dp-sec"><div class="dp-lbl">User impact</div><div class="dp-val">${exp.impact}</div></div>
          <div class="dp-sec"><div class="dp-lbl">Suggested action</div><div class="dp-val">${exp.action}</div></div>
        </div>
      </div>
      <div class="ticket-panel" id="tp-${uid}"></div>`;
  }

  return `
    <div class="check-item">
      <div class="check-main">
        <div class="cdot ${check.status}">${SI[check.status]||'?'}</div>
        <div class="cbody">
          <div class="cid">${esc(check.check_id)}</div>
          <div class="cdesc">${esc(check.description)}</div>
          ${check.details ? `<div class="cdetail">${esc(check.details)}${check.tolerance ? ` &nbsp;·&nbsp; Tolerance: ${esc(check.tolerance)}` : ''}</div>` : ''}
        </div>
      </div>
      ${ctasHtml}
    </div>`;
}

function togglePanel(dpId, tpId) {
  const dp = document.getElementById(dpId), tp = document.getElementById(tpId);
  if (!dp) return;
  const opening = !dp.classList.contains('open');
  dp.classList.toggle('open');
  if (opening && tp) tp.classList.remove('open');
}

function openTicket(tpId, dpId, checkId, desc, details, clientName, environment) {
  const tp = document.getElementById(tpId), dp = document.getElementById(dpId);
  if (!tp) return;
  const isOpen = tp.classList.contains('open');
  if (!isOpen) {
    const check = { check_id: checkId, description: desc, details: details };
    const t = generateTicket(check, clientName, environment);
    tp.innerHTML = `
      <div class="tp-hdr">
        <span>🎫 Jira Ticket Draft</span>
        <span style="font-size:10px;opacity:.7">${clientName} / ${environment}</span>
      </div>
      <div class="tp-body">
        <div><div class="tf-lbl">Summary</div><div class="tf-val" id="ts-${tpId}">${esc(t.summary)}</div></div>
        <div><div class="tf-lbl">Priority</div><div class="tf-val">${t.sev}</div></div>
        <div><div class="tf-lbl">Description (Jira markup)</div><div class="tf-val mono" id="td-${tpId}">${esc(t.description)}</div></div>
        <div class="tp-actions">
          <button class="cta cta-c" id="cs-${tpId}" onclick="copyEl('ts-${tpId}','cs-${tpId}')">Copy Summary</button>
          <button class="cta cta-c" id="cd-${tpId}" onclick="copyEl('td-${tpId}','cd-${tpId}')">Copy Description</button>
        </div>
      </div>`;
    if (dp) dp.classList.remove('open');
  }
  tp.classList.toggle('open');
}

function copyEl(elId, btnId) {
  const el = document.getElementById(elId), btn = document.getElementById(btnId);
  if (!el||!btn) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!'; btn.classList.replace('cta-c','cta-ok');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.replace('cta-ok','cta-c'); }, 2000);
  });
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'})+' IST';
}
function dur(s,e){ if(!s||!e)return'—'; const sec=Math.round((new Date(e)-new Date(s))/1000); return sec<60?`${sec}s`:`${Math.floor(sec/60)}m ${sec%60}s`; }

function renderPhase(phase, pi, ci, cn, env) {
  const id=`cl-${ci}-${pi}`, pct=phase.total>0?phase.passed/phase.total*100:0;
  const checks = phase.checks.map(c=>renderCheck(c,cn,env)).join('');
  return `
    <div class="phase-row" onclick="toggleChecks('${id}',this)">
      <div class="pnum ${phase.status}">P${phase.phase_number}</div>
      <span class="phase-name">${esc(phase.phase_name)}</span>
      <div class="phase-prog"><div class="ppf ${phase.status}" style="width:${pct}%"></div></div>
      <span class="phase-cnt">${phase.passed}/${phase.total}</span>
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="checks-list" id="${id}">${checks||'<div style="padding:10px 56px;font-size:12px;color:#667085">No checks recorded</div>'}</div>`;
}

function renderClient(c, i) {
  const pr=c.total_checks>0?Math.round(c.passed/c.total_checks*100):0;
  const bs=c.failed>0?'FAIL':c.warnings>0?'WARN':'PASS';
  return `
    <div class="client-card">
      <div class="card-hdr">
        <div class="card-title">${esc(c.name)}<span class="env-badge ${c.environment}">${c.environment}</span></div>
        <span class="sbadge ${c.status}">${c.status}</span>
      </div>
      <div class="card-stats">
        <div class="stat-cell"><span class="num tot">${c.total_checks}</span><span class="lbl">Checks</span></div>
        <div class="stat-cell"><span class="num pass">${c.passed}</span><span class="lbl">Passed</span></div>
        <div class="stat-cell"><span class="num warn">${c.warnings}</span><span class="lbl">Warnings</span></div>
        <div class="stat-cell"><span class="num fail">${c.failed}</span><span class="lbl">Failed</span></div>
        <div class="stat-cell"><span class="num pur">${pr}%</span><span class="lbl">Pass Rate</span></div>
        <div class="stat-cell"><span class="num tot" style="font-size:14px">${dur(c.run_started,c.run_completed)}</span><span class="lbl">Duration</span></div>
      </div>
      <div class="pass-bar-wrap"><div class="pass-bar"><div class="pbf ${bs}" style="width:${pr}%"></div></div><span class="pass-bar-lbl">${c.passed} of ${c.total_checks} passed</span></div>
      <div class="phases-list">${c.phases.map((p,pi)=>renderPhase(p,pi,i,c.name,c.environment)).join('')}</div>
    </div>`;
}

function renderDashboard(data) {
  _reportDate = formatDate(data.run_started);
  const s=data.overall_status||'UNAVAILABLE';
  const pr=data.total_checks>0?Math.round(data.passed/data.total_checks*100):0;
  const icon={PASS:'✓',FAIL:'✕',WARN:'!',UNAVAILABLE:'?'}[s]||'?';
  const title={PASS:'All Checks Passed',FAIL:'Failures Detected',WARN:'Warnings Found',UNAVAILABLE:'No Data'}[s]||s;
  document.getElementById('last-updated').textContent=`Last run: ${_reportDate}`;
  return `
    <div class="status-banner ${s}">
      <div class="banner-left"><div class="banner-icon">${icon}</div>
        <div><div class="banner-title">${title}</div><div class="banner-sub">Run ${data.run_id||'—'} &nbsp;·&nbsp; ${_reportDate} &nbsp;·&nbsp; ${dur(data.run_started,data.run_completed)}</div></div>
      </div>
      <div class="banner-stats">
        <div class="bstat"><span class="val n">${data.total_checks||0}</span><span class="lbl">Total</span></div>
        <div class="bstat"><span class="val pass">${data.passed||0}</span><span class="lbl">Passed</span></div>
        <div class="bstat"><span class="val warn">${data.warnings||0}</span><span class="lbl">Warnings</span></div>
        <div class="bstat"><span class="val fail">${data.failed||0}</span><span class="lbl">Failed</span></div>
        <div class="bstat"><span class="val p">${pr}%</span><span class="lbl">Pass Rate</span></div>
      </div>
    </div>
    <div class="section-hdr">
      <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#344054" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Environment Results</div>
      <span style="font-size:12px;color:#667085">${(data.clients||[]).length} environment${(data.clients||[]).length!==1?'s':''} tested</span>
    </div>
    <div class="clients-grid">${(data.clients||[]).map(renderClient).join('')}</div>`;
}

function toggleChecks(id,row){
  document.getElementById(id)?.classList.toggle('open');
  row.querySelector('.chevron')?.classList.toggle('open');
}

function updateCountdown(){
  const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  const next=new Date(ist); next.setHours(7,0,0,0);
  if(ist>=next) next.setDate(next.getDate()+1);
  const d=next-ist,h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  document.getElementById('countdown').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateCountdown,1000); updateCountdown();

async function loadReport(){
  try {
    const r=await fetch('reports/latest_report.json?t='+Date.now());
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    document.getElementById('main-content').innerHTML=renderDashboard(await r.json());
  } catch(e) {
    document.getElementById('main-content').innerHTML=`<div class="err-card"><div style="font-size:32px;margin-bottom:12px">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">No report data yet</div><div style="font-size:13px;color:var(--gray-500)">The agent runs daily at 07:00 IST.<br><small style="color:var(--gray-400)">${e.message}</small></div></div>`;
  }
}
loadReport(); setInterval(loadReport,5*60*1000);
</script>
