<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthScape QA · Finfactor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --purple: #6B2FE0;
  --purple-light: #EDE9FB;
  --purple-mid: #8B55E8;
  --purple-dark: #4A1FA3;
  --green: #12B76A;
  --green-light: #ECFDF5;
  --red: #F04438;
  --red-light: #FEF3F2;
  --amber: #F79009;
  --amber-light: #FFFAEB;
  --gray-50: #F9FAFB;
  --gray-100: #F2F4F7;
  --gray-200: #EAECF0;
  --gray-300: #D0D5DD;
  --gray-400: #98A2B3;
  --gray-500: #667085;
  --gray-700: #344054;
  --gray-900: #101828;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(16,24,40,0.05);
  --shadow: 0 1px 3px rgba(16,24,40,0.1), 0 1px 2px rgba(16,24,40,0.06);
  --shadow-md: 0 4px 8px -2px rgba(16,24,40,0.1), 0 2px 4px -2px rgba(16,24,40,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--purple);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-icon svg { width: 18px; height: 18px; fill: white; }

.logo-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
}

.sidebar-nav { padding: 12px 12px; flex: 1; }

.nav-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 0 8px;
  margin-bottom: 4px;
  margin-top: 16px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  text-decoration: none;
}

.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: var(--purple-light); color: var(--purple); }
.nav-item.active svg { stroke: var(--purple); }

.nav-item svg { width: 18px; height: 18px; stroke: var(--gray-500); stroke-width: 1.8; fill: none; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--gray-200);
  font-size: 12px;
  color: var(--gray-400);
  text-align: center;
}

/* ── Main ── */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--gray-900);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.next-run-badge {
  background: var(--purple-light);
  color: var(--purple);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.next-run-badge .dot {
  width: 6px; height: 6px;
  background: var(--purple);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.last-updated {
  font-size: 12px;
  color: var(--gray-500);
}

.refresh-btn {
  width: 34px; height: 34px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-500);
  transition: all 0.15s;
}

.refresh-btn:hover { background: var(--gray-100); border-color: var(--gray-300); }
.refresh-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

/* ── Content ── */
.content { padding: 24px 28px; flex: 1; }

/* ── Status Banner ── */
.status-banner {
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 24px;
  border: 1px solid;
}

.status-banner.PASS  { background: var(--green-light);  border-color: #A9EFC5; }
.status-banner.FAIL  { background: var(--red-light);    border-color: #FECDCA; }
.status-banner.WARN  { background: var(--amber-light);  border-color: #FEC84B; }
.status-banner.UNAVAILABLE { background: var(--gray-100); border-color: var(--gray-300); }

.banner-left { display: flex; align-items: center; gap: 14px; }

.banner-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.PASS  .banner-icon { background: #DCFCE7; }
.FAIL  .banner-icon { background: #FEE2E2; }
.WARN  .banner-icon { background: #FEF3C7; }

.banner-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
}

.banner-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

.banner-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.banner-stat { text-align: center; }
.banner-stat .val {
  font-size: 20px;
  font-weight: 700;
  display: block;
  line-height: 1.2;
}

.banner-stat .val.pass { color: var(--green); }
.banner-stat .val.fail { color: var(--red); }
.banner-stat .val.warn { color: var(--amber); }
.banner-stat .val.neutral { color: var(--gray-900); }
.banner-stat .val.purple { color: var(--purple); }
.banner-stat .lbl { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Cards Grid ── */
.clients-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(540px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.client-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.client-card:hover { box-shadow: var(--shadow-md); }

.card-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--gray-100);
}

.card-title-wrap { display: flex; align-items: center; gap: 8px; }

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-900);
}

.env-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
}

.env-badge.UAT  { background: #EFF8FF; color: #1570EF; border: 1px solid #B2DDFF; }
.env-badge.PROD { background: var(--amber-light); color: #B54708; border: 1px solid #FEC84B; }

.status-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.status-badge.PASS { background: var(--green-light); color: #027A48; border: 1px solid #A9EFC5; }
.status-badge.FAIL { background: var(--red-light); color: #B42318; border: 1px solid #FECDCA; }
.status-badge.WARN { background: var(--amber-light); color: #B54708; border: 1px solid #FEC84B; }
.status-badge.SKIP, .status-badge.UNAVAILABLE { background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200); }

/* ── Stat Row ── */
.card-stats {
  display: flex;
  border-bottom: 1px solid var(--gray-100);
}

.stat-cell {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  border-right: 1px solid var(--gray-100);
}

.stat-cell:last-child { border-right: none; }

.stat-cell .num {
  font-size: 18px;
  font-weight: 700;
  display: block;
  line-height: 1.2;
}

.stat-cell .num.pass { color: var(--green); }
.stat-cell .num.fail { color: var(--red); }
.stat-cell .num.warn { color: var(--amber); }
.stat-cell .num.total { color: var(--gray-900); }
.stat-cell .num.purple { color: var(--purple); }
.stat-cell .lbl { font-size: 10px; color: var(--gray-500); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Progress bar ── */
.pass-bar-wrap {
  padding: 8px 20px;
  border-bottom: 1px solid var(--gray-100);
  display: flex;
  align-items: center;
  gap: 10px;
}

.pass-bar {
  flex: 1;
  height: 5px;
  background: var(--gray-100);
  border-radius: 4px;
  overflow: hidden;
}

.pass-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.pass-bar-fill.PASS { background: var(--green); }
.pass-bar-fill.WARN { background: var(--amber); }
.pass-bar-fill.FAIL { background: var(--red); }

.pass-bar-label { font-size: 11px; color: var(--gray-500); white-space: nowrap; }

/* ── Phases ── */
.phases-list { }

.phase-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--gray-50);
}

.phase-row:hover { background: var(--gray-50); }
.phase-row:last-child { border-bottom: none; }

.phase-num {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-500);
  flex-shrink: 0;
}

.phase-num.PASS { background: var(--green-light); color: #027A48; }
.phase-num.FAIL { background: var(--red-light); color: #B42318; }
.phase-num.WARN { background: var(--amber-light); color: #B54708; }

.phase-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-700); }

.phase-progress {
  width: 100px;
  height: 4px;
  background: var(--gray-100);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}

.phase-progress-fill { height: 100%; border-radius: 3px; }
.phase-progress-fill.PASS { background: var(--green); }
.phase-progress-fill.FAIL { background: var(--red); }
.phase-progress-fill.WARN { background: var(--amber); }

.phase-count { font-size: 11px; color: var(--gray-500); width: 40px; text-align: right; flex-shrink: 0; }
.phase-chevron { color: var(--gray-400); flex-shrink: 0; transition: transform 0.2s; }
.phase-chevron.open { transform: rotate(90deg); }

/* ── Checks ── */
.checks-list {
  display: none;
  background: var(--gray-50);
  border-top: 1px solid var(--gray-100);
}

.checks-list.open { display: block; }

.check-item {
  display: flex;
  gap: 10px;
  padding: 9px 20px 9px 56px;
  border-bottom: 1px solid var(--gray-100);
  align-items: flex-start;
}

.check-item:last-child { border-bottom: none; }

.check-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 1px;
}

.check-dot.PASS { background: var(--green-light); color: #027A48; }
.check-dot.FAIL { background: var(--red-light); color: #B42318; }
.check-dot.WARN { background: var(--amber-light); color: #B54708; }
.check-dot.SKIP, .check-dot.UNAVAILABLE { background: var(--gray-100); color: var(--gray-500); }

.check-body { flex: 1; }
.check-id { font-size: 10px; font-weight: 600; color: var(--purple); margin-bottom: 1px; }
.check-desc { font-size: 12px; color: var(--gray-700); font-weight: 500; }
.check-detail { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

/* ── Loading / Error ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; gap: 16px;
}

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--gray-200);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 13px; color: var(--gray-500); }

.error-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
}

/* ── Errors section ── */
.errors-section {
  background: var(--white);
  border: 1px solid #FECDCA;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
}

.errors-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 8px; }
.error-line { font-size: 12px; color: var(--gray-700); padding: 3px 0; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .clients-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
    </div>
    <span class="logo-text">Finfactor</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">QA Agent</div>
    <a class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a class="nav-item" onclick="loadReport()">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z" stroke-dasharray="4"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      Latest Report
    </a>
    <div class="nav-label">Schedule</div>
    <a class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span>Daily 07:00 IST</span>
    </a>
  </nav>
  <div class="sidebar-footer">WealthScape MF Sanity Agent</div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">API Sanity Dashboard</div>
    <div class="topbar-right">
      <div class="last-updated" id="last-updated">Loading...</div>
      <div class="next-run-badge">
        <span class="dot"></span>
        Next run: <strong id="countdown">--:--:--</strong>
      </div>
      <button class="refresh-btn" onclick="loadReport()" title="Refresh">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="content">
    <div id="main-content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Fetching latest report...</div>
      </div>
    </div>
  </div>
</div>

<script>
const STATUS_ICON = { PASS: '✓', FAIL: '✕', WARN: '!', SKIP: '–', UNAVAILABLE: '?' };

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true,
    timeZone: 'Asia/Kolkata'
  }) + ' IST';
}

function formatDuration(start, end) {
  if (!start || !end) return '—';
  const s = Math.round((new Date(end) - new Date(start)) / 1000);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
}

function renderCheck(check) {
  return `
    <div class="check-item">
      <div class="check-dot ${check.status}">${STATUS_ICON[check.status] || '?'}</div>
      <div class="check-body">
        <div class="check-id">${check.check_id}</div>
        <div class="check-desc">${check.description}</div>
        ${check.details ? `<div class="check-detail">${check.details}${check.tolerance ? ` &nbsp;·&nbsp; Tolerance: ${check.tolerance}` : ''}</div>` : ''}
      </div>
    </div>`;
}

function renderPhase(phase, phaseIdx, clientIdx) {
  const id = `checks-${clientIdx}-${phaseIdx}`;
  const pct = phase.total > 0 ? phase.passed / phase.total * 100 : 0;
  const checksHtml = phase.checks.map(renderCheck).join('');
  return `
    <div class="phase-row" onclick="toggleChecks('${id}', this)">
      <div class="phase-num ${phase.status}">P${phase.phase_number}</div>
      <span class="phase-name">${phase.phase_name}</span>
      <div class="phase-progress">
        <div class="phase-progress-fill ${phase.status}" style="width:${pct}%"></div>
      </div>
      <span class="phase-count">${phase.passed}/${phase.total}</span>
      <svg class="phase-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="checks-list" id="${id}">
      ${checksHtml || '<div style="padding:10px 56px;font-size:12px;color:#667085">No checks recorded</div>'}
    </div>`;
}

function renderClient(client, idx) {
  const passRate = client.total_checks > 0 ? Math.round(client.passed / client.total_checks * 100) : 0;
  const duration = formatDuration(client.run_started, client.run_completed);
  const phasesHtml = client.phases.map((p, i) => renderPhase(p, i, idx)).join('');
  const barStatus = client.failed > 0 ? 'FAIL' : client.warnings > 0 ? 'WARN' : 'PASS';

  return `
    <div class="client-card">
      <div class="card-header">
        <div class="card-title-wrap">
          <span class="card-title">${client.name}</span>
          <span class="env-badge ${client.environment}">${client.environment}</span>
        </div>
        <span class="status-badge ${client.status}">${client.status}</span>
      </div>
      <div class="card-stats">
        <div class="stat-cell"><span class="num total">${client.total_checks}</span><span class="lbl">Checks</span></div>
        <div class="stat-cell"><span class="num pass">${client.passed}</span><span class="lbl">Passed</span></div>
        <div class="stat-cell"><span class="num warn">${client.warnings}</span><span class="lbl">Warnings</span></div>
        <div class="stat-cell"><span class="num fail">${client.failed}</span><span class="lbl">Failed</span></div>
        <div class="stat-cell"><span class="num purple">${passRate}%</span><span class="lbl">Pass Rate</span></div>
        <div class="stat-cell"><span class="num total" style="font-size:14px">${duration}</span><span class="lbl">Duration</span></div>
      </div>
      <div class="pass-bar-wrap">
        <div class="pass-bar"><div class="pass-bar-fill ${barStatus}" style="width:${passRate}%"></div></div>
        <span class="pass-bar-label">${client.passed} of ${client.total_checks} checks passed</span>
      </div>
      <div class="phases-list">${phasesHtml}</div>
    </div>`;
}

function renderDashboard(data) {
  const overallStatus = data.overall_status || 'UNAVAILABLE';
  const passRate = data.total_checks > 0 ? Math.round(data.passed / data.total_checks * 100) : 0;
  const icon = { PASS: '✓', FAIL: '✕', WARN: '!', UNAVAILABLE: '?' }[overallStatus] || '?';
  const title = { PASS: 'All Checks Passed', FAIL: 'Failures Detected', WARN: 'Warnings Found', UNAVAILABLE: 'No Data' }[overallStatus] || overallStatus;

  document.getElementById('last-updated').textContent = `Last run: ${formatDate(data.run_started)}`;

  const clientsHtml = (data.clients || []).map(renderClient).join('');
  const errorsHtml = data.errors && data.errors.length ? `
    <div class="errors-section">
      <div class="errors-title">⚠ Agent Errors</div>
      ${data.errors.map(e => `<div class="error-line">• ${e}</div>`).join('')}
    </div>` : '';

  return `
    <div class="status-banner ${overallStatus}">
      <div class="banner-left">
        <div class="banner-icon">${icon}</div>
        <div>
          <div class="banner-title">${title}</div>
          <div class="banner-sub">Run ${data.run_id || '—'} &nbsp;·&nbsp; ${formatDate(data.run_started)} &nbsp;·&nbsp; ${formatDuration(data.run_started, data.run_completed)}</div>
        </div>
      </div>
      <div class="banner-stats">
        <div class="banner-stat"><span class="val neutral">${data.total_checks || 0}</span><span class="lbl">Total</span></div>
        <div class="banner-stat"><span class="val pass">${data.passed || 0}</span><span class="lbl">Passed</span></div>
        <div class="banner-stat"><span class="val warn">${data.warnings || 0}</span><span class="lbl">Warnings</span></div>
        <div class="banner-stat"><span class="val fail">${data.failed || 0}</span><span class="lbl">Failed</span></div>
        <div class="banner-stat"><span class="val purple">${passRate}%</span><span class="lbl">Pass Rate</span></div>
      </div>
    </div>
    ${errorsHtml}
    <div class="section-header">
      <div class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#344054" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Environment Results
      </div>
      <span style="font-size:12px;color:#667085">${(data.clients||[]).length} environment${(data.clients||[]).length !== 1 ? 's' : ''} tested</span>
    </div>
    <div class="clients-grid">${clientsHtml}</div>`;
}

function toggleChecks(id, row) {
  const el = document.getElementById(id);
  const chevron = row.querySelector('.phase-chevron');
  if (el) el.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open');
}

// Countdown to 07:00 IST
function updateCountdown() {
  const ist = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
  const next = new Date(ist);
  next.setHours(7, 0, 0, 0);
  if (ist >= next) next.setDate(next.getDate() + 1);
  const diff = next - ist;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

async function loadReport() {
  try {
    const res = await fetch('reports/latest_report.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('main-content').innerHTML = renderDashboard(data);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-card">
        <div style="font-size:32px;margin-bottom:12px">📋</div>
        <div style="font-size:16px;font-weight:600;color:#101828;margin-bottom:6px">No report data yet</div>
        <div style="font-size:13px;color:#667085">The agent runs daily at 07:00 IST. Reports appear here automatically.<br><small style="color:#98A2B3">${err.message}</small></div>
      </div>`;
  }
}

loadReport();
setInterval(loadReport, 5 * 60 * 1000);
</script>
</body>
</html>
